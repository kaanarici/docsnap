name: publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - run: bun ci
      - run: bun run check
      - run: bun run publish:dry
      - name: Check package version
        id: npm
        run: |
          NAME=$(bun -e 'const p = await Bun.file("package.json").json(); console.log(p.name)')
          VERSION=$(bun -e 'const p = await Bun.file("package.json").json(); console.log(p.version)')
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION already exists on npm"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - run: bun publish --dry-run
        if: steps.npm.outputs.exists == 'false'
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: bun publish
        if: steps.npm.outputs.exists == 'false'
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
